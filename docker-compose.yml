services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     dogear
      POSTGRES_PASSWORD: dogear
      POSTGRES_DB:       dogear
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Postgres is internal-only by default. Uncomment to expose for local dev tools:
    # ports:
    #   - "${DOGEAR_DB_PORT:-54320}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dogear"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dogear:dogear@db:5432/dogear
    # App port is internal — only Caddy talks to it directly.
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${DOGEAR_HTTP_PORT:-80}:80"
      - "${DOGEAR_HTTPS_PORT:-443}:443"
    environment:
      # Set DOGEAR_HOST to your Tailscale hostname or domain for trusted HTTPS.
      # Examples:
      #   Tailscale:  DOGEAR_HOST=my-server.tail1234.ts.net
      #   Domain:     DOGEAR_HOST=library.yourdomain.com
      DOGEAR_HOST: ${DOGEAR_HOST:-:443}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@dogear.local
      PGADMIN_DEFAULT_PASSWORD: dogear
    ports:
      - "${DOGEAR_PGADMIN_PORT:-5050}:80"
    depends_on:
      - db

volumes:
  pgdata:
  caddy_data:
  caddy_config:
